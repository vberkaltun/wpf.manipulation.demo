parameters:
- name: executableName
  type: string
  default: 'Exporter'
- name: csvFileName
  type: string
  default: 'Applus Dependency Map.csv'

steps:
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
        $sourceDirectory = $($Env:BUILD_SOURCESDIRECTORY + "\")
        $targetDirectory = Join-Path -ChildPath "ci\assets\${{ parameters.csvFileName }}" -Path $($Env:BUILD_SOURCESDIRECTORY + "\")

        Write-Host "Source directory: '$($sourceDirectory)'"
        Write-Host "Target directory: '$($targetDirectory)'"

        $fileName = "${{ parameters.executableName }}.exe"
        $filePath = Get-ChildItem -Path $sourceDirectory -Recurse -File `
            | Where-Object { $_.Name -eq $fileName } `
            | Select-Object -ExpandProperty FullName

        If ([string]::IsNullOrEmpty($filePath) -or
            -not (Test-Path $filePath))
        {
            Write-Host "No file found, terminating..."
            exit
        }

        Write-Host "A file found at '$filePath'"
        & $filePath '--path' $targetDirectory